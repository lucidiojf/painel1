<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListaPro ✕ Bordio Cloud Hub</title>
    <style>
        :root {
            --bg-primary: #0a192f;
            --bg-secondary: #172a45;
            --bg-card: #020c1b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --google-blue: #4285F4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding-bottom: 70px; }
        header { background-color: var(--bg-secondary); padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; }

        /* Abas */
        .nav-tabs { display: flex; justify-content: space-around; background-color: var(--bg-secondary); position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 15px 10px; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; text-align: center; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-top: 3px solid var(--accent); background-color: rgba(56, 189, 248, 0.05); }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Formulários */
        h2 { margin: 20px 0 10px 0; font-size: 18px; color: var(--accent); }
        input, select, textarea { width: 100%; padding: 12px; background-color: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-main); margin-bottom: 10px; font-size: 16px; }
        button.btn-primary { width: 100%; padding: 12px; background-color: var(--accent); color: var(--bg-card); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        /* Botões de Ação */
        .btn-sync { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 5px; text-decoration: none; text-align: center; }
        .btn-google { background-color: var(--google-blue); color: white; }

        /* Cards */
        .total-box { background-color: rgba(56, 189, 248, 0.1); border: 1px dashed var(--accent); padding: 15px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .card-item { background-color: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; align-items: center; }
        .badge { font-size: 11px; padding: 3px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge.alta { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge.media { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge.baixa { background-color: rgba(34, 197, 94, 0.2); color: var(--success); }
        
        .file-link { color: var(--accent); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; font-weight: bold; }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .note-card { background-color: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; position: relative; min-height: 120px; }
        
        /* Barra de Sincronismo Nuvem */
        .sync-banner { background-color: rgba(34, 197, 94, 0.15); border: 1px solid var(--success); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .btn-refresh { background: var(--success); color: var(--bg-card); border: none; padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* Box de Backup manual */
        .backup-box { background-color: var(--bg-secondary); border: 1px dashed rgba(255,255,255,0.2); padding: 15px; border-radius: 8px; margin-top: 30px; }
        .btn-backup { background-color: #475569; color: white; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 48%; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 18px;">ListaPro ✕ Bordio Cloud</h1>
    </header>

    <div class="container">
        
        <div class="sync-banner">
            <span id="sync-status">🔄 Conectando ao Google Sheets...</span>
            <button class="btn-refresh" onclick="puxarDadosNuvem()">Atualizar 🔄</button>
        </div>
        
        <section id="listapro-view" class="view-section active">
            <div class="total-box">Total Local: <span id="total-gastos-val">R$ 0,00</span></div>
            
            <h2>Adicionar Item / Despesa</h2>
            <input type="text" id="gasto-nome" placeholder="Ex: Boleto Energia">
            <input type="number" id="gasto-valor" placeholder="Valor R$">
            <input type="text" id="gasto-anexo" placeholder="Link do Boleto/Recibo (GitHub)">
            <button class="btn-primary" onclick="addGasto()">Salvar na Lista</button>

            <h2>Itens e Recibos</h2>
            <div id="gastos-container"></div>
        </section>

        <section id="bordio-view" class="view-section">
            <h2>Criar Evento ou Tarefa</h2>
            <input type="text" id="tarefa-nome" placeholder="Ex: Cir alex">
            <input type="datetime-local" id="tarefa-data">
            <select id="tarefa-prioridade">
                <option value="baixa">Prioridade Baixa</option>
                <option value="media">Prioridade Média</option>
                <option value="alta">Prioridade Alta</option>
            </select>
            <input type="text" id="tarefa-anexo" placeholder="Link de documento anexo (Opcional)">
            
            <button class="btn-primary" onclick="addTarefaLocal()">Salvar no Painel</button>

            <h2>Linha do Tempo (Bordio)</h2>
            <div id="tarefas-container"></div>
        </section>

        <section id="notas-view" class="view-section">
            <h2>Notas & Links Rápidos</h2>
            
            <button class="btn-sync btn-google" onclick="abrirLinkExterno('https://github.com/lucidiojf/painel1/upload/main')" style="margin-bottom: 10px; background-color: var(--accent); color: var(--bg-card);">
                Subir Foto/PDF para o GitHub
            </button>

            <textarea id="nota-texto" rows="3" placeholder="Digite a anotação ou lembrete clínico aqui..."></textarea>
            <input type="text" id="nota-link" placeholder="Link do documento/foto associado (Opcional)">
            <button class="btn-primary" onclick="addNota()">Fixar Nota</button>

            <h2>Notas Fixadas</h2>
            <div class="notes-grid" id="notas-container"></div>

            <div class="backup-box">
                <h3 style="font-size: 13px; color: var(--text-main); margin-bottom: 10px;">🛡️ Recuperação Manual</h3>
                <div style="display: flex; justify-content: space-between;">
                    <button class="btn-backup" onclick="exportarBackup()">Gerar Backup</button>
                    <button class="btn-backup" onclick="document.getElementById('importFile').click()" style="background-color: var(--success); color: var(--bg-card);">Puxar .json</button>
                </div>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importarBackupManual(this)">
            </div>
        </section>

    </div>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('listapro-view', this)">📊 ListaPro</button>
        <button class="tab-btn" onclick="switchTab('bordio-view', this)">📅 Bordio</button>
        <button class="tab-btn" onclick="switchTab('notas-view', this)">📝 Notas</button>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQJgO1Kb-KaWvUAlkRH8mceVf26dGjgoJ7nhtbeuJZrKTOl-KPYrgMJxkLpgkRydmv/exec";

        let despesas = [];
        let tarefas = [];
        let notas = [];

        function switchTab(viewId, element) {
            var sections = document.getElementsByClassName('view-section');
            for(var i=0; i<sections.length; i++) { sections[i].classList.remove('active'); }
            
            var tabs = document.getElementsByClassName('tab-btn');
            for(var j=0; j<tabs.length; j++) { tabs[j].classList.remove('active'); }
            
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
            renderAll();
        }

        function abrirLinkExterno(url) {
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        async function enviarDadosNuvem() {
            if(!SCRIPT_URL || SCRIPT_URL.indexOf("SUA_URL") !== -1) return;
            document.getElementById('sync-status').innerText = "📤 Salvando na Nuvem...";
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ despesas: despesas, tarefas: tarefas, notas: notas })
                });
                document.getElementById('sync-status').innerText = "✅ Sincronizado com o Google Sheets";
            } catch(e) {
                document.getElementById('sync-status').innerText = "❌ Erro ao salvar na nuvem";
            }
        }

        async function puxarDadosNuvem() {
            if(!SCRIPT_URL || SCRIPT_URL.indexOf("SUA_URL") !== -1) {
                document.getElementById('sync-status').innerText = "⚠️ URL não configurada";
                return;
            }
            document.getElementById('sync-status').innerText = "📥 Buscando dados novos...";
            try {
                const response = await fetch(SCRIPT_URL);
                const nuvem = await response.json();
                
                if(nuvem && (nuvem.despesas || nuvem.tarefas || nuvem.notas)) {
                    despesas = nuvem.despesas || [];
                    tarefas = nuvem.tarefas || [];
                    notas = nuvem.notas || [];
                    document.getElementById('sync-status').innerText = "✅ Tudo Atualizado!";
                } else {
                    document.getElementById('sync-status').innerText = "✅ Conectado (Nuvem Vazia)";
                }
                renderAll();
            } catch(e) {
                document.getElementById('sync-status').innerText = "⚠️ Erro de Conexão";
            }
        }

        function importarBackupManual(input) {
            const reader = new FileReader();
            reader.onload = function(){
                try {
                    const dados = JSON.parse(reader.result);
                    despesas = dados.despesas || [];
                    tarefas = dados.tarefas || [];
                    notas = dados.notas || [];
                    renderAll();
                    alert("Dados aplicados! Gravando no Google Sheets...");
                    enviarDadosNuvem();
                } catch(e) {
                    alert("Arquivo inválido.");
                }
            };
            reader.readAsText(input.files[0]);
        }

        function exportarBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({despesas: despesas, tarefas: tarefas, notas: notas}));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "backup_painel_listabordio.json");
            dlAnchor.click();
        }

        function addGasto() {
            const nome = document.getElementById('gasto-nome').value.trim();
            const valor = parseFloat(document.getElementById('gasto-valor').value) || 0;
            const anexo = document.getElementById('gasto-anexo').value.trim();
            if(!nome) return;
            despesas.push({ id: Date.now(), nome: nome, valor: valor, anexo: anexo });
            document.getElementById('gasto-nome').value = '';
            document.getElementById('gasto-valor').value = '';
            document.getElementById('gasto-anexo').value = '';
            renderAll();
            enviarDadosNuvem();
        }

        function deleteGasto(id) {
            despesas = despesas.filter(function(d) { return d.id !== id; });
            renderAll();
            enviarDadosNuvem();
        }

        function addTarefaLocal() {
            const nome = document.getElementById('tarefa-nome').value.trim();
            const dataRaw = document.getElementById('tarefa-data').value; 
            const prioridade = document.getElementById('tarefa-prioridade').value;
            const anexo = document.getElementById('tarefa-anexo').value.trim();
            if(!nome || !dataRaw) return alert('Defina título e data.');
            tarefas.push({ id: Date.now(), nome: nome, data: dataRaw, prioridade: prioridade, anexo: anexo });
            document.getElementById('tarefa-nome').value = '';
            document.getElementById('tarefa-data').value = '';
            document.getElementById('tarefa-anexo').value = '';
            renderAll();
            enviarDadosNuvem();
        }

        function dispararGoogleCalendar(nome, dataRaw, anexo, prioridade) {
            let limpa = dataRaw.replace(/[: text\-]/g, "") + "00";
            const dataObj = new Date(dataRaw);
            dataObj.setHours(dataObj.getHours() + 1);
            const dataEnd = dataObj.getFullYear() + String(dataObj.getMonth() + 1).padStart(2, '0') + String(dataObj.getDate()).padStart(2, '0') + "T" + String(dataObj.getHours()).padStart(2, '0') + String(dataObj.getMinutes()).padStart(2, '0') + "00";
            let detalhes = "Prioridade: " + prioridade.toUpperCase();
            if(anexo) detalhes += "\n\nAnexo:\n" + anexo;
            abrirLinkExterno("https://www.google.com/calendar/render?action=TEMPLATE&text=" + encodeURIComponent(nome) + "&dates=" + limpa + "/" + dataEnd + "&details=" + encodeURIComponent(detalhes));
        }

        function deleteTarefa(id) {
            tarefas = tarefas.filter(function(t) { return t.id !== id; });
            renderAll();
            enviarDadosNuvem();
        }

        function addNota() {
            const texto = document.getElementById('nota-texto').value.trim();
            const link = document.getElementById('nota-link').value.trim();
            if(!texto && !link) return;
            notas.push({ id: Date.now(), texto: texto, link: link });
            document.getElementById('nota-texto').value = '';
            document.getElementById('nota-link').value = '';
            renderAll();
            enviarDadosNuvem();
        }

        function deleteNota(id) {
            notas = notas.filter(function(n) { return n.id !== id; });
            renderAll();
            enviarDadosNuvem();
        }

        function renderAll() {
            const gCont = document.getElementById('gastos-container');
            if(gCont) {
                gCont.innerHTML = '';
                let total = 0;
                despesas.forEach(function(d) {
                    total += d.valor;
                    gCont.innerHTML += '<div class="card-item"><div class="card-row"><strong>' + d.nome + '</strong><span style="font-weight:bold;">R$ ' + d.valor.toFixed(2) + '</span></div><div class="card-row">' + (d.anexo ? '<button onclick="abrirLinkExterno(\'' + d.anexo + '\')" class="file-link" style="background:none; border:none; cursor:pointer;">📎 Ver Anexo</button>' : '<span></span>') + '<button class="delete-btn" onclick="deleteGasto(' + d.id + ')">🗑️</button></div></div>';
                });
                document.getElementById('total-gastos-val').innerText = 'R$ ' + total.toFixed(2);
            }

            const tCont = document.getElementById('tarefas-container');
            if(tCont) {
                tCont.innerHTML = '';
                tarefas.sort(function(a,b) { return new Date(a.data) - new Date(b.data); }).forEach(function(t) {
                    const dataExibicao = new Date(t.data).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
                    tCont.innerHTML += '<div class="card-item"><div class="card-row"><div><strong>' + t.nome + '</strong><div class="card-meta" style="margin-top:4px;"><span>📅 ' + dataExibicao + '</span><span class="badge ' + t.prioridade + '">' + t.prioridade + '</span></div></div><button class="delete-btn" onclick="deleteTarefa(' + t.id + ')">🗑️</button></div><div style="display:flex; gap:8px; margin-top:8px;"><button onclick="dispararGoogleCalendar(\'' + t.nome + '\', \'' + t.data + '\', \'' + (t.anexo || '') + '\', \'' + t.prioridade + '\')" class="btn-sync btn-google" style="flex:1; margin-top:0;">🗓️ Calendar</button><button onclick="abrirLinkExterno(\'https://tasks.google.com/\')" class="btn-sync" style="flex:1; background-color:#f1f5f9; color:#1e293b; margin-top:0;">☑️ Tasks</button></div>' + (t.anexo ? '<div style="margin-top:5px;"><button onclick="abrirLinkExterno(\'' + t.anexo + '\')" class="file-link" style="background:none; border:none; cursor:pointer;">🔗 Doc Associado</button></div>' : '') + '</div>';
                });
            }

            const nCont = document.getElementById('notas-container');
            if(nCont) {
                nCont.innerHTML = '';
                notas.forEach(function(n) {
                    nCont.innerHTML += '<div class="note-card" style="display:flex; flex-direction:column; justify-content:space-between; padding-bottom:35px;"><div><p style="font-size:13px; white-space:pre-wrap; margin-bottom:10px; font-weight:500;">' + (n.texto || 'Nota com Link') + '</p>' + (n.link ? '<button onclick="abrirLinkExterno(\'' + n.link + '\')" class="file-link" style="background:none; border:none; cursor:pointer; font-weight:bold; padding:2px 0;">🔗 Ver Link</button>' : '') + '</div><button class="delete-btn" style="position:absolute; bottom:5px; right:5px; font-size:12px;" onclick="deleteNota(' + n.id + ')">🗑️</button></div>';
                });
            }
        }

        puxarDadosNuvem();
    </script>
</body>
</html>
